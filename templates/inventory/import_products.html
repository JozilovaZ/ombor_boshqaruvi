{% extends "index.html" %}
{% block title %}Mahsulotlarni import qilish{% endblock %}
{% block content %}
<style>
    .main-content {
        margin-left: 250px;
        padding: 20px;
    }
    .form-container {
        max-width: 600px;
        background-color: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .form-group {
        margin-bottom: 15px;
    }
    .form-group label {
        display: block;
        margin-bottom: 5px;
    }
    .form-group input {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
    }
    .form-group input[type="submit"] {
        background-color: #2c3e50;
        color: white;
        border: none;
        cursor: pointer;
    }
    .form-group input[type="submit"]:hover {
        background-color: #34495e;
    }
</style>
<div class="main-content">
    <h2>Mahsulotlarni CSV dan import qilish</h2>
    <div class="form-container">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group">
                <label for="csv_file">CSV faylni tanlang:</label>
                <input type="file" name="csv_file" accept=".csv" required>
            </div>
            <div class="form-group">
                <input type="submit" value="Import qilish">
            </div>
        </form>
        <p><strong>Eslatma:</strong> CSV faylda quyidagi ustunlar bo‘lishi kerak: "Mahsulot nomi", "Kategoriya", "Miqdor".</p>
    </div>
</div>
{% endblock %}
