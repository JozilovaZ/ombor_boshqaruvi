{% extends "index.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="container-fluid py-4">
    <div class="card">
        <div class="card-header bg-danger text-white">
            <h4>{{ title }}</h4>
        </div>
        <div class="card-body">
            <p>Haqiqatan ham <strong>Kirim #{{ kirim.id }}</strong> ni o'chirmoqchimisiz?</p>
            <p class="text-danger"><strong>Diqqat!</strong> Kirim bilan birga uning barcha mahsulotlari ham o'chib ketadi!</p>

            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2">
                    <a href="{% url 'incoming_list' %}" class="btn btn-secondary">Bekor qilish</a>
                    <button type="submit" class="btn btn-danger">O'chirish</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
